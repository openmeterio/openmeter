    C 124 162, 115 155, 100 155
    C 85 155, 76 162, 67 155
    C 58 148, 49 155, 40 162
    Z
  " fill="url(#ghostGrad)" filter="url(#glow)"/>

  <g opacity="0.15" stroke="#ffffff" stroke-width="1.2" stroke-dasharray="4,3">
    <line x1="60" y1="85" x2="140" y2="85"/>
    <line x1="55" y1="110" x2="145" y2="110"/>
    <line x1="60" y1="135" x2="140" y2="135"/>
    <line x1="78" y1="55" x2="78" y2="150"/>
    <line x1="100" y1="42" x2="100" y2="152"/>
    <line x1="122" y1="55" x2="122" y2="150"/>
  </g>

  <ellipse cx="79" cy="88" rx="14" ry="15" fill="white"/>
  <ellipse cx="121" cy="88" rx="14" ry="15" fill="white"/>

  <ellipse cx="83" cy="91" rx="7" ry="8" fill="#1A2E4A"/>

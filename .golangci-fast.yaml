# yaml-language-server: $schema=https://golangci-lint.run/jsonschema/golangci.jsonschema.json
version: "2"
linters:
  default: none
  enable:
    - bodyclose
    - errcheck
    - govet
    - ineffassign
    - misspell
    - nolintlint
    - sloglint
    - staticcheck
    - unconvert
    - whitespace
  settings:
    misspell:
      locale: US
    nolintlint:
      require-specific: true
    revive:
      confidence: 0
    staticcheck:
      checks:
        - "all"
        - "-QF1008"
        - "-SA1019" # https://staticcheck.dev/docs/checks/#SA1019
        # FIXME: re-enable the following checks
        - "-ST1003"
        - "-ST1016"
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    paths:
      - collector/benthos/internal
      - third_party$
      - builtin$
      - examples$

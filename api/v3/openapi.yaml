    BillingRateCardDiscounts:
      type: object
      properties:
        percentage:
          type: number
          minimum: 0
          maximum: 100
          description: Percentage discount applied to the price (0–100).
        usage:
          allOf:
            - $ref: '#/components/schemas/Numeric'
          description: |-
            Number of usage units granted free before billing starts.
            Only applies to usage-based lines (not flat fees). Usage is treated as zero
            until this amount is exhausted.
      description: Discount configuration for a rate card.
    BillingRateCardProrationConfiguration:
      type: object
      required:
        - mode
      properties:
        mode:
          allOf:
            - $ref: '#/components/schemas/BillingRateCardProrationMode'
          description: The proration mode of the rate card.
          title: Proration mode
      description: The proration configuration of the rate card.
    BillingRateCardProrationMode:
      type: string
      enum:
        - no_proration
        - prorate_prices
      description: |-
        The proration mode of the rate card.

        Values:
        - `no_proration`: No proration.
        - `prorate_prices`: Prorate the price based on the time remaining in the billing period.
    BillingRateCardTaxConfig:
      type: object
      required:
        - code
      properties:
        behavior:
          $ref: '#/components/schemas/BillingTaxBehavior'
        code:
          $ref: '#/components/schemas/TaxCodeReferenceItem'
      description: The tax config of the rate card.
    BillingSettlementMode:
      type: string
      enum:
        - credit_then_invoice
        - credit_only
      description: |-
        Settlement mode for billing.

        Values:
        - `credit_then_invoice`: Credits are applied first, then any remainder is invoiced.
        - `credit_only`: Usage is settled exclusively against credits.
      title: Settlement mode
    BillingSpendCommitments:
      type: object
      properties:
        minimum_amount:
          allOf:
            - $ref: '#/components/schemas/Numeric'
          description: The customer is committed to spend at least the amount.
          title: Minimum amount
        maximum_amount:
          allOf:
            - $ref: '#/components/schemas/Numeric'
          description: The customer is limited to spend at most the amount.
          title: Maximum amount
      description: |-
        Spend commitments for a rate card.
        The customer is committed to spend at least the minimum amount and at most the maximum amount.
    BillingSubscription:
      type: object
      required:
        - id
        - customer_id
        - billing_anchor
        - status
      properties:
        id:
          allOf:
            - $ref: '#/components/schemas/ULID'
          readOnly: true
        labels:
          $ref: '#/components/schemas/Labels'
        created_at:
          allOf:
            - $ref: '#/components/schemas/DateTime'
          description: An ISO-8601 timestamp representation of entity creation date.
          readOnly: true
        updated_at:
          allOf:
            - $ref: '#/components/schemas/DateTime'
          description: An ISO-8601 timestamp representation of entity last update date.
          readOnly: true
        deleted_at:
          allOf:
            - $ref: '#/components/schemas/DateTime'
          description: An ISO-8601 timestamp representation of entity deletion date.
          readOnly: true
        customer_id:
          allOf:
            - $ref: '#/components/schemas/ULID'
          description: The customer ID of the subscription.
          title: Customer ID
          readOnly: true
        plan_id:
          allOf:
            - $ref: '#/components/schemas/ULID'
          description: |-
            The plan ID of the subscription.
            Set if subscription is created from a plan.
          title: Plan ID
          readOnly: true
        billing_anchor:
          allOf:
            - $ref: '#/components/schemas/DateTime'
          description: |-
            A billing anchor is the fixed point in time that determines the subscription's recurring billing cycle.
            It affects when charges occur and how prorations are calculated.
            Common anchors:
            - Calendar month (1st of each month): `2025-01-01T00:00:00Z`
            - Subscription anniversary (day customer signed up)
            - Custom date (customer-specified day)
          title: Billing anchor
          readOnly: true
        status:
          allOf:
            - $ref: '#/components/schemas/BillingSubscriptionStatus'
          description: The status of the subscription.
          title: Status
          readOnly: true
      description: Subscription.

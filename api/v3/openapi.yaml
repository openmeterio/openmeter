          type: string
          description: |-
            Success URL to redirect customers after completing payment or setup.

            Not allowed when ui_mode is "embedded".
            See: https://docs.stripe.com/payments/checkout/custom-success-page
        ui_mode:
          allOf:
            - $ref: '#/components/schemas/BillingAppStripeCheckoutSessionUIMode'
          description: |-
            The UI mode for the checkout session.

            "hosted" displays a Stripe-hosted page. "embedded" integrates directly into your app.
            Defaults to "hosted".
          default: hosted
        payment_method_types:
          type: array
          items:
            type: string
          description: |-
            List of payment method types to enable (e.g., "card", "us_bank_account").

            If not specified, Stripe enables all relevant payment methods.
        redirect_on_completion:
          allOf:
            - $ref: '#/components/schemas/BillingAppStripeCreateCheckoutSessionRedirectOnCompletion'
          description: |-
            Redirect behavior for embedded checkout sessions.

            Controls when to redirect users after completion.
            See: https://docs.stripe.com/payments/checkout/custom-success-page?payment-ui=embedded-form
        tax_id_collection:
          allOf:
            - $ref: '#/components/schemas/BillingAppStripeCreateCheckoutSessionTaxIdCollection'
          description: Configuration for collecting tax IDs during checkout.
      description: |-
        Configuration options for creating a Stripe Checkout Session.

        Based on Stripe's [Checkout Session API parameters](https://docs.stripe.com/api/checkout/sessions/create).
    BillingAppStripeCreateCheckoutSessionResult:
      type: object
      required:
        - customer_id
        - stripe_customer_id
        - session_id
        - setup_intent_id
        - created_at
        - mode
      properties:
        customer_id:
          allOf:
            - $ref: '#/components/schemas/ULID'
          description: The customer ID in the billing system.
        stripe_customer_id:
          type: string
          description: The Stripe customer ID.
        session_id:
          type: string
          description: The Stripe checkout session ID.
        setup_intent_id:
          type: string
          description: The setup intent ID created for collecting the payment method.
        client_secret:
          type: string
          description: |-
            Client secret for initializing Stripe.js on the client side.

            Required for embedded checkout sessions.
            See: https://docs.stripe.com/payments/checkout/custom-success-page
        client_reference_id:
          type: string
          description: |-
            The client reference ID provided in the request.

            Useful for reconciling the session with your internal systems.
        customer_email:
          type: string
          description: Customer's email address if provided to Stripe.
        currency:
          allOf:
            - $ref: '#/components/schemas/CurrencyCode'
          description: Currency code for the checkout session.
        created_at:
          allOf:
            - $ref: '#/components/schemas/DateTime'
          description: Timestamp when the checkout session was created.
        expires_at:
          allOf:
            - $ref: '#/components/schemas/DateTime'
          description: Timestamp when the checkout session will expire.
        metadata:
          type: object
          additionalProperties:
            type: string
          description: Metadata attached to the checkout session.
        status:
          type: string
          description: |-
            The status of the checkout session.

            See: https://docs.stripe.com/api/checkout/sessions/object#checkout_session_object-status
        url:
          type: string
          description: URL to redirect customers to the checkout page (for hosted mode).
        mode:
          allOf:
            - $ref: '#/components/schemas/BillingAppStripeCheckoutSessionMode'
          description: |-
            Mode of the checkout session.

            Currently only "setup" mode is supported for collecting payment methods.
        cancel_url:
          type: string
          description: The cancel URL where customers are redirected if they cancel.
        success_url:
          type: string
          description: The success URL where customers are redirected after completion.
        return_url:
          type: string
          description: The return URL for embedded sessions after authentication.
      description: |-
        Result of creating a Stripe Checkout Session.

        Contains all the information needed to redirect customers to the checkout
        or initialize an embedded checkout flow.
    BillingAppStripeCreateCheckoutSessionTaxIdCollection:
      type: object
      properties:
        enabled:
          type: boolean
          description: |-
            Enable tax ID collection during checkout.

            Defaults to false.
          default: false
        required:
          allOf:
            - $ref: '#/components/schemas/BillingAppStripeCreateCheckoutSessionTaxIdCollectionRequired'
          description: |-
            Whether tax ID collection is required.

            Defaults to "never".
          default: never
      description: Tax ID collection configuration for checkout sessions.
    BillingAppStripeCreateCheckoutSessionTaxIdCollectionRequired:
      type: string
      enum:
        - if_supported
        - never
      description: Tax ID collection requirement level.
    BillingAppStripeCreateCustomerPortalSessionOptions:
      type: object
      properties:
        configuration_id:
          type: string
          description: |-
            The ID of an existing [Stripe configuration](https://docs.stripe.com/api/customer_portal/configurations) to use for this session,
            describing its functionality and features.
            If not specified, the session uses the default configuration.
        locale:
          type: string
          description: |-
            The IETF [language tag](https://docs.stripe.com/api/customer_portal/sessions/create#create_portal_session-locale) of the locale customer portal is displayed in.
            If blank or `auto`, the customer's preferred_locales or browser's locale is used.
        return_url:
          type: string
          description: |-
            The [URL to redirect](https://docs.stripe.com/api/customer_portal/sessions/create#create_portal_session-return_url) the customer to after they have completed
            their requested actions.
      description: Request to create a Stripe Customer Portal Session.
    BillingAppStripeCreateCustomerPortalSessionResult:
      type: object
      required:
        - id
        - stripe_customer_id
        - configuration_id
        - livemode
        - created_at
        - return_url
        - locale
        - url
      properties:
        id:
          type: string
          description: |-
            The ID of the customer portal session.

            See: https://docs.stripe.com/api/customer_portal/sessions/object#portal_session_object-id
        stripe_customer_id:
          type: string
          description: The ID of the stripe customer.
        configuration_id:
          type: string
          description: |-
            Configuration used to customize the customer portal.

            See: https://docs.stripe.com/api/customer_portal/sessions/object#portal_session_object-configuration
        livemode:
          type: boolean
          description: |-
            Livemode.

            See: https://docs.stripe.com/api/customer_portal/sessions/object#portal_session_object-livemode
        created_at:
          allOf:
            - $ref: '#/components/schemas/DateTime'
          description: |-
            Created at.

            See: https://docs.stripe.com/api/customer_portal/sessions/object#portal_session_object-created
        return_url:
          type: string
          description: |-
            Return URL.

            See: https://docs.stripe.com/api/customer_portal/sessions/object#portal_session_object-return_url
        locale:
          type: string
          description: |-
            The IETF language tag of the locale customer portal is displayed in.

            See: https://docs.stripe.com/api/customer_portal/sessions/object#portal_session_object-locale
        url:
          type: string
          description: |-
            The URL to redirect the customer to after they have completed
            their requested actions.
      description: |-
        Result of creating a [Stripe Customer Portal Session](https://docs.stripe.com/api/customer_portal/sessions/object).

        Contains all the information needed to redirect the customer to the Stripe Customer Portal.
    BillingAppType:
      type: string
      enum:
        - sandbox
        - stripe
        - external_invoicing
      description: The type of the app.
    BillingCharge:
      type: object
      oneOf:
        - $ref: '#/components/schemas/BillingFlatFeeCharge'
        - $ref: '#/components/schemas/BillingUsageBasedCharge'
      discriminator:
        propertyName: type
        mapping:
          flat_fee: '#/components/schemas/BillingFlatFeeCharge'
          usage_based: '#/components/schemas/BillingUsageBasedCharge'
      description: Customer charge.
      title: Customer charge
    BillingChargeStatus:
      type: string
      enum:
        - created
        - active
        - final
        - deleted
      description: |-
        Lifecycle status of a charge.

        Values:
        - `created`: The charge has been created but is not active yet.
        - `active`: The charge is active.
        - `final`: The charge is fully finalized and no further changes are expected.
        - `deleted`: The charge has been deleted.
      title: Charge status
    BillingChargeTaxConfig:
      type: object
      properties:
        behavior:
          allOf:
            - $ref: '#/components/schemas/BillingTaxBehavior'
          description: Tax behavior applied to the charge.
          title: Tax behavior
        tax_code:
          type: object
          properties:
            id:
              $ref: '#/components/schemas/ULID'
          required:
            - id
          description: Tax code applied to the charge.
          title: Tax code
      description: Tax configuration of a charge.
      title: Charge tax configuration
    BillingChargeTotals:
      type: object
      required:
        - booked
      properties:
        booked:
          allOf:
            - $ref: '#/components/schemas/BillingTotals'
          description: The amount of the charge already booked to the internal accounting system.
          title: Booked
          readOnly: true
        realtime:
          allOf:
            - $ref: '#/components/schemas/BillingTotals'
          description: |-
            The realtime amount of the charge.

            Requires the `realtime_usage` expand.
          title: Realtime totals
          readOnly: true
      description: |-
        The totals of a change.

        RealTime is only expanded when the `real_time_usage` expand is used.
    BillingChargesExpand:
      type: string
      enum:
        - real_time_usage
      description: |-
        Expands for customer charges.

        Values:
        - `real_time_usage`: The charge's real-time usage.
      title: Customer charge expands
    BillingCostBasis:
      type: object
      required:
        - id
        - fiat_code
        - rate
      properties:
        id:
          allOf:
            - $ref: '#/components/schemas/ULID'
          readOnly: true
        fiat_code:
          allOf:
            - $ref: '#/components/schemas/CurrencyCode'
          description: The fiat currency code for the cost basis.
        rate:
          allOf:
            - $ref: '#/components/schemas/Numeric'
          description: The cost rate for the currency.
        effective_from:
          allOf:
            - $ref: '#/components/schemas/DateTime'
          description: |-
            An ISO-8601 timestamp representation of the date from which the cost basis is effective.
            If not provided, it will be effective immediately and will set to `now` by the system.
        created_at:
          allOf:
            - $ref: '#/components/schemas/DateTime'
          description: An ISO-8601 timestamp representation of entity creation date.
          readOnly: true
      description: Describes currency basis supported by billing system.
    BillingCreditAdjustment:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 256
          description: |-
            Display name of the resource.

            Between 1 and 256 characters.
        description:
          type: string
          maxLength: 1024
          description: |-
            Optional description of the resource.

            Maximum 1024 characters.
        labels:
          $ref: '#/components/schemas/Labels'
      description: |-
        A credit adjustment can be used to make manual adjustments to a customer's credit balance.

        Supported use-cases:
        - Usage correction
      title: Credit adjustment
    BillingCreditAvailabilityPolicy:
      type: string
      enum:
        - on_creation
      description: |-
        When credits become available for consumption.

        - `on_creation`: Credits are available as soon as the grant is created.
        - `on_authorization`: Credits are available once the payment is authorized.
        - `on_settlement`: Credits are available once the payment is settled.
      title: Credit availability policy
    BillingCreditBalances:
      type: object
      required:
        - retrieved_at
        - balances
      properties:
        retrieved_at:
          allOf:
            - $ref: '#/components/schemas/DateTime'
          description: The timestamp of the balance retrieval.
          readOnly: true
        balances:
          type: array
          items:
            $ref: '#/components/schemas/CreditBalance'
          description: The balances by currencies.
          readOnly: true
      description: The balances of the credits of a customer.
      title: Credit balances
    BillingCreditFundingMethod:
      type: string
      enum:
        - none
        - invoice
        - external
      description: |-
        The funding method describes how the grant is funded.

        - `none`: No funding workflow applies, for example promotional grants
        - `invoice`: The grant is funded by an in-system invoice flow
        - `external`: The grant is funded outside the system (e.g., wire transfer, external invoice, or manual reconciliation)
      title: Credit funding method
    BillingCreditGrant:
      type: object
      required:
        - id
        - name
        - funding_method
        - currency
        - amount
        - status
      properties:
        id:
          allOf:
            - $ref: '#/components/schemas/ULID'
          readOnly: true
        name:
          type: string
          minLength: 1
          maxLength: 256
          description: |-
            Display name of the resource.

            Between 1 and 256 characters.
        description:
          type: string
          maxLength: 1024
          description: |-
            Optional description of the resource.

            Maximum 1024 characters.
        labels:
          $ref: '#/components/schemas/Labels'
        created_at:
          allOf:
            - $ref: '#/components/schemas/DateTime'
          description: An ISO-8601 timestamp representation of entity creation date.
          readOnly: true
        updated_at:
          allOf:
            - $ref: '#/components/schemas/DateTime'
          description: An ISO-8601 timestamp representation of entity last update date.
          readOnly: true
        deleted_at:
          allOf:
            - $ref: '#/components/schemas/DateTime'
          description: An ISO-8601 timestamp representation of entity deletion date.
          readOnly: true
        funding_method:
          allOf:
            - $ref: '#/components/schemas/BillingCreditFundingMethod'
          description: Funding method of the grant.
        currency:
          allOf:
            - $ref: '#/components/schemas/BillingCurrencyCode'
          description: The currency of the granted credits.
        amount:
          allOf:
            - $ref: '#/components/schemas/Numeric'
          description: Granted credit amount.
        purchase:
          type: object
          properties:
            currency:
              allOf:
                - $ref: '#/components/schemas/CurrencyCode'
              description: Currency of the purchase amount.
            per_unit_cost_basis:
              allOf:
                - $ref: '#/components/schemas/Numeric'
              description: |-
                Cost basis per credit unit used to calculate the purchase amount.

                If `per_unit_cost_basis` is 0.50 and credit amount is $100.00,
                the total charge is $50.00.
                The value must be greater than 0. If the cost basis is 0, use
                `funding_method=none` instead.

                Defaults to 1.0.
              default: '1.0'
            amount:
              allOf:
                - $ref: '#/components/schemas/Numeric'
              description: |-
                The purchase amount.
                Calculated from `per_unit_cost_basis` and credit `amount`.
              readOnly: true
            availability_policy:
              allOf:
                - $ref: '#/components/schemas/BillingCreditAvailabilityPolicy'
              description: |-
                Controls when credits become available for consumption.

                Defaults to `on_creation`.
              default: on_creation
            settlement_status:
              allOf:
                - $ref: '#/components/schemas/BillingCreditPurchasePaymentSettlementStatus'
              description: Current payment settlement status.
              readOnly: true
          required:
            - currency
            - amount
          description: |-
            Purchase and payment terms of the grant.
            Present when a funding workflow applies (funding_method is not `none`).
        tax_config:
          allOf:
            - $ref: '#/components/schemas/BillingCreditGrantTaxConfig'
          description: |-
            Tax configuration for the grant.

            For `invoice` and `external` funding methods, tax configuration should be provided to ensure correct revenue recognition.
            When not provided, the default credit grant tax code is applied, if that's not set the global default taxcode is used.
        invoice:
          type: object
          properties:
            id:
              allOf:
                - $ref: '#/components/schemas/ULID'
              description: Identifier of the invoice associated with the grant.
              readOnly: true
            line:
              type: object
              properties:
                id:
                  $ref: '#/components/schemas/ULID'
              required:
                - id
              description: Identifier of the invoice line associated with the grant.
              readOnly: true
          description: |-
            Invoice references for the grant.
            Available when `funding_method` is `invoice`.
          readOnly: true
        filters:
          type: object
          properties:
            features:
              type: array
              items:
                $ref: '#/components/schemas/ResourceKey'
              description: |-
                Limit the credit grant to specific features.
                If no features are specified, the credit grant can be used for any feature.
              example:
                - input_tokens
                - output_tokens
          description: Filters for the credit grant.
        priority:
          type: integer
          format: int16
          minimum: 1
          maximum: 1000
          description: |-
            Draw-down priority of the grant.
            Lower values have higher priority.
          default: 10
        voided_at:
          allOf:
            - $ref: '#/components/schemas/DateTime'
          description: Timestamp when the grant was voided.
          readOnly: true
        status:
          allOf:
            - $ref: '#/components/schemas/BillingCreditGrantStatus'
          description: Current lifecycle status of the grant.
          readOnly: true
      description: |-
        A credit grant allocates credits to a customer.

        Credits are drawn down against charges according to the
        settlement mode configured on the rate card.
      title: Credit grant
    BillingCreditGrantStatus:
      type: string
      enum:
        - pending
        - active
        - expired
        - voided
      description: |-
        Credit grant lifecycle status.

        - `pending`: The credit block has been created but is not yet valid. (`effective_at` is in the future or availability_policy is not met)
        - `active`: The credit block is currently valid and eligible for consumption. (`effective_at` is in the past, `expires_at` is in the future and availability_policy is met)
        - `expired`: The credit block expired with remaining unused balance, `expires_at` time has passed.
        - `voided`: The credit block was voided. Remaining balance is forfeited.
      title: Credit grant lifecycle status
    BillingCreditGrantTaxConfig:
      type: object
      properties:
        behavior:
          allOf:
            - $ref: '#/components/schemas/BillingTaxBehavior'
          description: Tax behavior applied to the invoice line item.
        tax_code:
          type: object
          properties:
            id:
              $ref: '#/components/schemas/ULID'
          required:
            - id
          description: Tax code applied to the invoice line item.
      description: |-
        Tax configuration for a credit grant.

        Tax configuration should be provided to ensure correct revenue recognition,
        including for externally funded grants.
      title: Tax configuration for a credit grant
    BillingCreditPurchasePaymentSettlementStatus:
      type: string
      enum:
        - pending
        - authorized
        - settled
      description: |-
        Credit purchase payment settlement status.

        - `pending`: Payment has been initiated and is not yet authorized.
        - `authorized`: Payment has been authorized.
        - `settled`: Payment has been settled.
      title: Credit purchase payment settlement status
    BillingCreditTransaction:
      type: object
      required:
        - id
        - name
        - booked_at
        - type
        - currency
        - amount
        - available_balance
      properties:
        id:
          allOf:
            - $ref: '#/components/schemas/ULID'
          readOnly: true
        name:
          type: string
          minLength: 1
          maxLength: 256
          description: |-
            Display name of the resource.

            Between 1 and 256 characters.
        description:
          type: string
          maxLength: 1024
          description: |-
            Optional description of the resource.

            Maximum 1024 characters.
        labels:
          $ref: '#/components/schemas/Labels'
        created_at:
          allOf:
            - $ref: '#/components/schemas/DateTime'
          description: An ISO-8601 timestamp representation of entity creation date.
          readOnly: true
        booked_at:
          allOf:
            - $ref: '#/components/schemas/DateTime'
          description: The date and time the transaction was booked.
          readOnly: true
        type:
          allOf:
            - $ref: '#/components/schemas/BillingCreditTransactionType'
          description: The type of credit transaction.
          readOnly: true
        currency:
          allOf:
            - $ref: '#/components/schemas/BillingCurrencyCode'
          description: Currency of the balance affected by the transaction.
          readOnly: true
        amount:
          allOf:
            - $ref: '#/components/schemas/Numeric'
          description: |-
            Signed amount of the credit movement.
            Positive values add balance, negative values reduce balance.
          readOnly: true
        available_balance:
          type: object
          properties:
            before:
              $ref: '#/components/schemas/Numeric'
            after:
              $ref: '#/components/schemas/Numeric'
          required:
            - before
            - after
          description: The available balance before and after the transaction.
          readOnly: true
      description: |-
        A credit transaction represents a single credit movement on the customer's balance.

        Credit transactions are immutable.
      title: Credit transaction
    BillingCreditTransactionType:
      type: string
      enum:
        - funded
        - consumed
      description: |-
        The type of the credit transaction.

        - `funded`: Credit granted and available for consumption.
        - `consumed`: Credit consumed by usage or fees.
    BillingCurrency:
      type: object
      oneOf:
        - $ref: '#/components/schemas/BillingCurrencyFiat'
        - $ref: '#/components/schemas/BillingCurrencyCustom'
      discriminator:
        propertyName: type
        mapping:
          fiat: '#/components/schemas/BillingCurrencyFiat'
          custom: '#/components/schemas/BillingCurrencyCustom'
      description: Fiat or custom currency.
    BillingCurrencyCode:
      type: string
      allOf:
        - $ref: '#/components/schemas/CurrencyCode'
      description: Fiat or custom currency code.
      x-go-type: string
    BillingCurrencyCodeCustom:
      type: string
      minLength: 3
      maxLength: 24
      description: |-
        Custom currency code.
        It should be a unique code but not conflicting with any existing fiat currency codes.
    BillingCurrencyCustom:
      type: object
      required:
        - id
        - type
        - name
        - code
      properties:
        id:
          allOf:
            - $ref: '#/components/schemas/ULID'
          readOnly: true
        type:
          type: string
          enum:
            - custom
          description: The type of the currency.
          readOnly: true
        name:
          type: string
          minLength: 1
          maxLength: 256
          description: The name of the currency. It should be a human-readable string that represents the name of the currency, such as "US Dollar" or "Euro".
        description:
          type: string
          minLength: 1
          maxLength: 256
          description: Description of the currency.
        symbol:
          type: string
          minLength: 1
          description: The symbol of the currency. It should be a string that represents the symbol of the currency, such as "$" for US Dollar or "€" for Euro.
        code:
          $ref: '#/components/schemas/BillingCurrencyCodeCustom'
        created_at:
          allOf:
            - $ref: '#/components/schemas/DateTime'
          description: An ISO-8601 timestamp representation of the custom currency creation date.
          readOnly: true
      description: Describes custom currency.
    BillingCurrencyFiat:
      type: object
      required:
        - id
        - type
        - name
        - code
      properties:
        id:
          allOf:
            - $ref: '#/components/schemas/ULID'
          readOnly: true
        type:
          type: string
          enum:
            - fiat
          description: The type of the currency.
          readOnly: true
        name:
          type: string
          minLength: 1
          maxLength: 256
          description: The name of the currency. It should be a human-readable string that represents the name of the currency, such as "US Dollar" or "Euro".
        description:
          type: string
          minLength: 1
          maxLength: 256
          description: Description of the currency.
        symbol:
          type: string
          minLength: 1
          description: The symbol of the currency. It should be a string that represents the symbol of the currency, such as "$" for US Dollar or "€" for Euro.
        code:
          allOf:
            - $ref: '#/components/schemas/CurrencyCode'
          readOnly: true
      description: Currency describes a currency supported by the billing system.
    BillingCurrencyType:
      type: string
      enum:
        - fiat
        - custom
      description: |-
        Currency type for custom currencies.
        It should be a unique code but not conflicting with any existing standard currency codes.
    BillingCustomer:
      type: object
      required:
        - id
        - name
        - key
      properties:
        id:
          allOf:
            - $ref: '#/components/schemas/ULID'
          readOnly: true
        name:
          type: string
          minLength: 1
          maxLength: 256
          description: |-
            Display name of the resource.

            Between 1 and 256 characters.
        description:
          type: string
          maxLength: 1024
          description: |-
            Optional description of the resource.

            Maximum 1024 characters.
        labels:
          $ref: '#/components/schemas/Labels'
        created_at:
          allOf:
            - $ref: '#/components/schemas/DateTime'
          description: An ISO-8601 timestamp representation of entity creation date.
          readOnly: true
        updated_at:
          allOf:
            - $ref: '#/components/schemas/DateTime'
          description: An ISO-8601 timestamp representation of entity last update date.
          readOnly: true
        deleted_at:
          allOf:
            - $ref: '#/components/schemas/DateTime'
          description: An ISO-8601 timestamp representation of entity deletion date.
          readOnly: true
        key:
          $ref: '#/components/schemas/ExternalResourceKey'
        usage_attribution:
          allOf:
            - $ref: '#/components/schemas/BillingCustomerUsageAttribution'
          description: Mapping to attribute metered usage to the customer by the event subject.
          title: Usage Attribution
        primary_email:
          type: string
          description: The primary email address of the customer.
          title: Primary Email
        currency:
          allOf:
            - $ref: '#/components/schemas/CurrencyCode'
          description: |-
            Currency of the customer.
            Used for billing, tax and invoicing.
          title: Currency
        billing_address:
          allOf:
            - $ref: '#/components/schemas/BillingAddress'
          description: |-
            The billing address of the customer.
            Used for tax and invoicing.
          title: Billing Address
      description: Customers can be individuals or organizations that can subscribe to plans and have access to features.
    BillingCustomerData:
      type: object
      properties:
        billing_profile:
          allOf:
            - $ref: '#/components/schemas/BillingProfileReference'
          description: |-
            The billing profile for the customer.

            If not provided, the default billing profile will be used.
          title: Billing profile
        app_data:
          allOf:
            - $ref: '#/components/schemas/BillingAppCustomerData'
          description: App customer data.
          title: App customer data
      description: Billing customer data.
    BillingCustomerReference:
      type: object
      required:
        - id
      properties:
        id:
          allOf:
            - $ref: '#/components/schemas/ULID'
          description: The ID of the customer.
      description: Customer reference.
    BillingCustomerStripeCreateCheckoutSessionRequest:
      type: object
      required:
        - stripe_options
      properties:
        stripe_options:
          allOf:
            - $ref: '#/components/schemas/BillingAppStripeCreateCheckoutSessionRequestOptions'
          description: |-
            Options for configuring the Stripe Checkout Session.

            These options are passed directly to Stripe's [checkout session creation API](https://docs.stripe.com/api/checkout/sessions/create).
      description: |-
        Request to create a Stripe Checkout Session for the customer.

        Checkout Sessions are used to collect payment method information from customers
        in a secure, Stripe-hosted interface. This integration uses setup mode to collect
        payment methods that can be charged later for subscription billing.
    BillingCustomerStripeCreateCustomerPortalSessionRequest:
      type: object
      required:
        - stripe_options
      properties:
        stripe_options:
          allOf:
            - $ref: '#/components/schemas/BillingAppStripeCreateCustomerPortalSessionOptions'
          description: Options for configuring the Stripe Customer Portal Session.
      description: |-
        Request to create a Stripe Customer Portal Session for the customer.

        Useful to redirect the customer to the Stripe Customer Portal to manage their payment methods,
        change their billing address and access their invoice history.
        Only returns URL if the customer billing profile is linked to a stripe app and customer.
    BillingCustomerUsageAttribution:
      type: object
      required:
        - subject_keys
      properties:
        subject_keys:
          type: array
          items:
            $ref: '#/components/schemas/UsageAttributionSubjectKey'
          minItems: 0
          description: |-
            The subjects that are attributed to the customer.
            Can be empty when no usage event subjects are associated with the customer.
          title: Subject Keys
      description: |-
        Mapping to attribute metered usage to the customer.
        One customer can have zero or more subjects,
        but one subject can only belong to one customer.
    BillingEntitlementAccessResult:
      type: object
      required:
        - type
        - feature_key
        - has_access
      properties:
        type:
          allOf:
            - $ref: '#/components/schemas/BillingEntitlementType'
          description: The type of the entitlement.
          example: static
          readOnly: true
        feature_key:
          allOf:
            - $ref: '#/components/schemas/ResourceKey'
          description: The feature key of the entitlement.
          example: available_models
          readOnly: true
        has_access:
          type: boolean
          description: |-
            Whether the customer has access to the feature.
            Always true for `boolean` and `static` entitlements.
            Depends on balance for `metered` entitlements.
          example: true
          readOnly: true
        config:
          type: string
          description: |-
            Only available for static entitlements.
            Config is the JSON parsable configuration of the entitlement.
            Useful to describe per customer configuration.
          example: '{ "availableModels": ["gpt-5", "gpt-4o"] }'
          readOnly: true
      description: Entitlement access result.
    BillingEntitlementType:
      type: string
      enum:
        - metered
        - static
        - boolean
      description: The type of the entitlement.
    BillingFeatureLLMTokenType:
      type: string
      enum:
        - input
        - output
        - cache_read
        - cache_write
        - reasoning
        - request
        - response
      description: Token type for LLM cost lookup.
    BillingFeatureLLMUnitCost:
      type: object
      required:
        - type
      properties:
        type:
          type: string
          enum:
            - llm
          description: The type discriminator for LLM unit cost.
        provider_property:
          type: string
          description: |-
            Meter group-by property that holds the LLM provider.
            Use this when the meter has a group-by dimension for provider.
            Mutually exclusive with `provider`.
          title: Provider property
        provider:
          type: string
          description: |-
            Static LLM provider value (e.g., "openai", "anthropic").
            Use this when the feature tracks a single provider.
            Mutually exclusive with `provider_property`.
          title: Provider
        model_property:
          type: string
          description: |-
            Meter group-by property that holds the model ID.
            Use this when the meter has a group-by dimension for model.
            Mutually exclusive with `model`.
          title: Model property
        model:
          type: string
          description: |-
            Static model ID value (e.g., "gpt-4", "claude-3-5-sonnet").
            Use this when the feature tracks a single model.
            Mutually exclusive with `model_property`.
          title: Model
        token_type_property:
          type: string
          description: |-
            Meter group-by property that holds the token type.
            Use this when the meter has a group-by dimension for token type.
            Mutually exclusive with `token_type`.
          title: Token type property
        token_type:
          allOf:
            - $ref: '#/components/schemas/BillingFeatureLLMTokenType'
          description: |-
            Static token type value.
            Use this when the feature tracks a single token type (e.g., only input tokens).
            `request` is an alias for `input`, `response` is an alias for `output`.
            Mutually exclusive with `token_type_property`.
          title: Token type
        pricing:
          allOf:
            - $ref: '#/components/schemas/BillingFeatureLLMUnitCostPricing'
          description: |-
            Resolved per-token pricing from the LLM cost database.
            Populated in responses when the provider and model can be determined,
            either from static values or from meter group-by filters with exact matches.
          title: Resolved pricing
          readOnly: true
      description: |-
        LLM cost lookup configuration.
        Each dimension (provider, model, token type) can be specified as either
        a static value or a meter group-by property name (mutually exclusive).
    BillingFeatureLLMUnitCostPricing:
      type: object
      required:
        - input_per_token
        - output_per_token
      properties:
        input_per_token:
          allOf:
            - $ref: '#/components/schemas/Numeric'
          description: Cost per input token in USD.
          title: Input per token
        output_per_token:
          allOf:
            - $ref: '#/components/schemas/Numeric'
          description: Cost per output token in USD.
          title: Output per token
        cache_read_per_token:
          allOf:
            - $ref: '#/components/schemas/Numeric'
          description: Cost per cache read token in USD.
          title: Cache read per token
        reasoning_per_token:
          allOf:
            - $ref: '#/components/schemas/Numeric'
          description: Cost per reasoning token in USD.
          title: Reasoning per token
        cache_write_per_token:
          allOf:
            - $ref: '#/components/schemas/Numeric'
          description: Cost per cache write token in USD.
          title: Cache write per token
      description: Resolved per-token pricing from the LLM cost database.
    BillingFeatureManualUnitCost:
      type: object
      required:
        - type
        - amount
      properties:
        type:
          type: string
          enum:
            - manual
          description: The type discriminator for manual unit cost.
        amount:
          allOf:
            - $ref: '#/components/schemas/Numeric'
          description: Fixed per-unit cost amount in USD.
      description: A fixed per-unit cost amount.
    BillingFeatureUnitCost:
      type: object
      oneOf:
        - $ref: '#/components/schemas/BillingFeatureManualUnitCost'
        - $ref: '#/components/schemas/BillingFeatureLLMUnitCost'
      discriminator:
        propertyName: type
        mapping:
          manual: '#/components/schemas/BillingFeatureManualUnitCost'
          llm: '#/components/schemas/BillingFeatureLLMUnitCost'
      description: |-
        Per-unit cost configuration for a feature.
        Either a fixed manual amount or a dynamic LLM cost lookup.
    BillingFlatFeeCharge:
      type: object
      required:
        - id
        - name
        - type
        - customer
        - managed_by
        - currency
        - status
        - invoice_at
        - service_period
        - full_service_period
        - billing_period
        - price
        - settlement_mode
        - payment_term
        - proration_configuration
        - amount_after_proration
      properties:
        id:
          allOf:
            - $ref: '#/components/schemas/ULID'
          readOnly: true
        name:
          type: string
          minLength: 1
          maxLength: 256
          description: |-
            Display name of the resource.

            Between 1 and 256 characters.
        description:
          type: string
          maxLength: 1024
          description: |-
            Optional description of the resource.

            Maximum 1024 characters.
        labels:
          $ref: '#/components/schemas/Labels'
        created_at:
          allOf:
            - $ref: '#/components/schemas/DateTime'
          description: An ISO-8601 timestamp representation of entity creation date.
          readOnly: true
        updated_at:
          allOf:
            - $ref: '#/components/schemas/DateTime'
          description: An ISO-8601 timestamp representation of entity last update date.
          readOnly: true
        deleted_at:
          allOf:
            - $ref: '#/components/schemas/DateTime'
          description: An ISO-8601 timestamp representation of entity deletion date.
          readOnly: true
        type:
          type: string
          enum:
            - flat_fee
          description: The type of the charge.
          title: Type
          readOnly: true
        customer:
          allOf:
            - $ref: '#/components/schemas/BillingCustomerReference'
          description: The customer owning the charge.
          title: Customer
          readOnly: true
        managed_by:
          allOf:
            - $ref: '#/components/schemas/ResourceManagedBy'
          description: The charge is managed by the following entity.
          title: Managed by
          readOnly: true
        subscription:
          allOf:
            - $ref: '#/components/schemas/BillingSubscriptionReference'
          description: The subscription that originated the charge, when the charge was created from a subscription item.
          title: Subscription
          readOnly: true
        currency:
          allOf:
            - $ref: '#/components/schemas/CurrencyCode'
          description: The currency of the charge.
          title: Currency
          readOnly: true
        status:
          allOf:
            - $ref: '#/components/schemas/BillingChargeStatus'
          description: The lifecycle status of the charge.
          title: Status
          readOnly: true
        invoice_at:
          allOf:
            - $ref: '#/components/schemas/DateTime'
          description: The timestamp when the charge is intended to be invoiced.
          title: Invoice at
          readOnly: true
        service_period:
          allOf:
            - $ref: '#/components/schemas/ClosedPeriod'
          description: The effective service period covered by the charge.
          title: Service period
          readOnly: true
        full_service_period:
          allOf:
            - $ref: '#/components/schemas/ClosedPeriod'
          description: The full, unprorated service period of the charge.
          title: Full service period
          readOnly: true
        billing_period:
          allOf:
            - $ref: '#/components/schemas/ClosedPeriod'
          description: The billing period the charge belongs to.
          title: Billing period
          readOnly: true
        advance_after:
          allOf:
            - $ref: '#/components/schemas/DateTime'
          description: The earliest time when the charge should be advanced again by background processing.
          title: Advance after
          readOnly: true
        price:
          allOf:
            - $ref: '#/components/schemas/BillingPrice'
          description: The price of the charge.
          title: Price
          readOnly: true
        unique_reference_id:
          type: string
          description: Unique reference ID of the charge.
          title: Unique reference ID
          readOnly: true
        settlement_mode:
          allOf:
            - $ref: '#/components/schemas/BillingSettlementMode'
          description: Settlement mode of the charge.
          title: Settlement mode
          readOnly: true
        tax_config:
          allOf:
            - $ref: '#/components/schemas/BillingChargeTaxConfig'
          description: Tax configuration of the charge.
          title: Tax configuration
          readOnly: true
        payment_term:
          allOf:
            - $ref: '#/components/schemas/BillingPricePaymentTerm'
          description: Payment term of the flat fee charge.
          title: Payment term
        discounts:
          allOf:
            - $ref: '#/components/schemas/BillingFlatFeeDiscounts'
          description: The discounts applied to the charge.
          title: Discounts
        feature_key:
          type: string
          description: The feature associated with the charge, when applicable.
          title: Feature key
        proration_configuration:
          allOf:
            - $ref: '#/components/schemas/BillingRateCardProrationConfiguration'
          description: The proration configuration of the charge.
          title: Proration configuration
        amount_after_proration:
          allOf:
            - $ref: '#/components/schemas/CurrencyAmount'
          description: The amount after proration of the charge.
          title: Amount after proration
          readOnly: true
      description: A flat fee charge for a customer.
      title: Flat fee charge
    BillingFlatFeeDiscounts:
      type: object
      properties:
        percentage:
          type: number
          minimum: 0
          maximum: 100
          description: Percentage discount applied to the price (0–100).
      description: |-
        Discounts applicable to flat fee charges.

        This is the same as `ProductCatalog.Discounts` but without the `usage` field, which is not applicable to flat fee charges.
      title: Flat fee charge discounts
    BillingParty:
      type: object
      properties:
        id:
          type: string
          description: Unique identifier for the party.
          readOnly: true
        key:
          allOf:
            - $ref: '#/components/schemas/ExternalResourceKey'
          description: An optional unique key of the party.
        name:
          type: string
          description: Legal name or representation of the party.
        tax_id:
          allOf:
            - $ref: '#/components/schemas/BillingPartyTaxIdentity'
          description: |-
            The entity's legal identification used for tax purposes. They may have
            other numbers, but we're only interested in those valid for tax purposes.
        addresses:
          allOf:
            - $ref: '#/components/schemas/BillingPartyAddresses'
          description: Address for where information should be sent if needed.
      description: Party represents a person or business entity.
    BillingPartyAddresses:
      type: object
      required:
        - billing_address
      properties:
        billing_address:
          allOf:
            - $ref: '#/components/schemas/Address'
          description: Billing address.
      description: A collection of addresses for the party.
    BillingPartyTaxIdentity:
      type: object
      properties:
        code:
          allOf:
            - $ref: '#/components/schemas/BillingTaxIdentificationCode'
          description: Normalized tax identification code shown on the original identity document.
      description: Identity stores the details required to identify an entity for tax purposes in a specific country.
    BillingPlan:
      type: object
      required:
        - id
        - name
        - key
        - version
        - currency
        - billing_cadence
        - status
        - phases
      properties:
        id:
          allOf:
            - $ref: '#/components/schemas/ULID'
          readOnly: true
        name:
          type: string
          minLength: 1
          maxLength: 256
          description: |-
            Display name of the resource.

            Between 1 and 256 characters.
        description:
          type: string
          maxLength: 1024
          description: |-
            Optional description of the resource.

            Maximum 1024 characters.
        labels:
          $ref: '#/components/schemas/Labels'
        created_at:
          allOf:
            - $ref: '#/components/schemas/DateTime'
          description: An ISO-8601 timestamp representation of entity creation date.
          readOnly: true
        updated_at:
          allOf:
            - $ref: '#/components/schemas/DateTime'
          description: An ISO-8601 timestamp representation of entity last update date.
          readOnly: true
        deleted_at:
          allOf:
            - $ref: '#/components/schemas/DateTime'
          description: An ISO-8601 timestamp representation of entity deletion date.
          readOnly: true
        key:
          allOf:
            - $ref: '#/components/schemas/ResourceKey'
          description: |-
            A key is a semi-unique string that is used to identify the plan.
            It is used to reference the latest `active` version of the plan and is unique with the version number.
          title: Key
        version:
          type: integer
          minimum: 1
          description: Plans are versioned to allow you to make changes without affecting running subscriptions.
          title: Version
          default: 1
          readOnly: true
        currency:
          allOf:
            - $ref: '#/components/schemas/CurrencyCode'
          description: The currency code of the plan.
          title: Currency
        billing_cadence:
          allOf:
            - $ref: '#/components/schemas/ISO8601Duration'
          description: The billing cadence for subscriptions using this plan.
          title: Billing cadence
        pro_rating_enabled:
          type: boolean
          description: |-
            Whether pro-rating is enabled for this plan.

            TODO: WIP — pro-rating mode and exact semantics will be defined in a later iteration.
          title: Pro-rating enabled
          default: true
        effective_from:
          allOf:
            - $ref: '#/components/schemas/DateTime'
          description: |-
            The date and time when the plan becomes `active`.
            When not specified, the plan is in `draft` status.
          title: Effective start date
          readOnly: true
        effective_to:
          allOf:
            - $ref: '#/components/schemas/DateTime'
          description: |-
            A scheduled date and time when the plan becomes `archived`.
            When not specified, the plan is in `active` status indefinitely.
          title: Effective end date
          readOnly: true
        status:
          allOf:
            - $ref: '#/components/schemas/BillingPlanStatus'
          description: |-
            The status of the plan.
            Computed based on the effective start and end dates:
            - draft = no effectiveFrom
            - active = effectiveFrom <= now < effectiveTo
            - archived / inactive = effectiveTo <= now
            - scheduled = now < effectiveFrom < effectiveTo
          title: Status
          readOnly: true
        phases:
          type: array
          items:
            $ref: '#/components/schemas/BillingPlanPhase'
          minItems: 1
          description: |-
            The plan phases define the pricing ramp for a subscription.
            A phase switch occurs only at the end of a billing period.
            At least one phase is required.
          title: Plan phases
        validation_errors:
          type: array
          items:
            $ref: '#/components/schemas/ProductCatalogValidationError'
          description: List of validation errors in `draft` state that prevent the plan from being published.
          title: Validation errors
          readOnly: true
      description: Plans provide a template for subscriptions.
    BillingPlanPhase:
      type: object
      required:
        - name
        - key
        - rate_cards
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 256
          description: |-
            Display name of the resource.

            Between 1 and 256 characters.
        description:
          type: string
          maxLength: 1024
          description: |-
            Optional description of the resource.

            Maximum 1024 characters.
        labels:
          $ref: '#/components/schemas/Labels'
        key:
          $ref: '#/components/schemas/ResourceKey'
        duration:
          allOf:
            - $ref: '#/components/schemas/ISO8601Duration'
          description: |-
            The duration of the phase.
            When not specified, the phase runs indefinitely. Only the last phase may omit the duration.
          title: Duration
        rate_cards:
          type: array
          items:
            $ref: '#/components/schemas/BillingRateCard'
          description: The rate cards of the plan.
          title: Rate cards
      description: The plan phase or pricing ramp allows changing a plan's rate cards over time as a subscription progresses.
    BillingPlanStatus:
      type: string
      enum:
        - draft
        - active
        - archived
        - scheduled
      description: |-
        The status of a plan.
        - `draft`: The plan has not yet been published and can be edited.
        - `active`: The plan is published and can be used in subscriptions.
        - `archived`: The plan is no longer available for use.
        - `scheduled`: The plan is scheduled to be published at a future date.
    BillingPrice:
      type: object
      oneOf:
        - $ref: '#/components/schemas/BillingPriceFree'
        - $ref: '#/components/schemas/BillingPriceFlat'
        - $ref: '#/components/schemas/BillingPriceUnit'
        - $ref: '#/components/schemas/BillingPriceGraduated'
        - $ref: '#/components/schemas/BillingPriceVolume'
      discriminator:
        propertyName: type
        mapping:
          free: '#/components/schemas/BillingPriceFree'
          flat: '#/components/schemas/BillingPriceFlat'
          unit: '#/components/schemas/BillingPriceUnit'
          graduated: '#/components/schemas/BillingPriceGraduated'
          volume: '#/components/schemas/BillingPriceVolume'
      description: Price.
    BillingPriceFlat:
      type: object
      required:
        - type
        - amount
      properties:
        type:
          type: string
          enum:
            - flat
          description: The type of the price.
          title: Type
        amount:
          allOf:
            - $ref: '#/components/schemas/Numeric'
          description: The amount of the flat price.
          title: Amount
      description: Flat price.
    BillingPriceFree:
      type: object
      required:
        - type
      properties:
        type:
          type: string
          enum:
            - free
          description: The type of the price.
          title: Type
      description: Free price.
    BillingPriceGraduated:
      type: object
      required:
        - type
        - tiers
      properties:
        type:
          type: string
          enum:
            - graduated
          description: The type of the price.
          title: Type
        tiers:
          type: array
          items:
            $ref: '#/components/schemas/BillingPriceTier'
          minItems: 1
          description: |-
            The tiers of the graduated price.
            At least one tier is required.
          title: Tiers
      description: |-
        Graduated tiered price.

        Each tier's rate applies only to the usage within that tier.
        Pricing can change as cumulative usage crosses tier boundaries.

        When UnitConfig is present on the rate card, tier boundaries (up_to_amount)
        are expressed in converted billing units.
    BillingPricePaymentTerm:
      type: string
      enum:
        - in_advance
        - in_arrears
      description: The payment term of a flat price.
    BillingPriceTier:
      type: object
      properties:
        up_to_amount:
          allOf:
            - $ref: '#/components/schemas/Numeric'
          description: |-
            Up to and including this quantity will be contained in the tier.
            If undefined, the tier is open-ended (the last tier).
          title: Up to quantity
        flat_price:
          allOf:
            - $ref: '#/components/schemas/BillingPriceFlat'
          description: |-
            The flat price component of the tier.
            Charged once when the tier is entered.
          title: Flat price component
        unit_price:
          allOf:
            - $ref: '#/components/schemas/BillingPriceUnit'
          description: |-
            The unit price component of the tier.
            Charged per billing unit within the tier.
          title: Unit price component
      description: |-
        A price tier used in graduated and volume pricing.

        At least one price component (flat_price or unit_price) must be set.
        When UnitConfig is present on the rate card, up_to_amount is expressed
        in converted billing units.
    BillingPriceUnit:
      type: object
      required:
        - type
        - amount
      properties:
        type:
          type: string
          enum:
            - unit
          description: The type of the price.
          title: Type
        amount:
          allOf:
            - $ref: '#/components/schemas/Numeric'
          description: The amount of the unit price.
          title: Amount
      description: |-
        Unit price.

        Charges a fixed rate per billing unit.
        When UnitConfig is present on the rate card, billing units are the
        converted quantities (e.g. GB instead of bytes).
    BillingPriceVolume:
      type: object
      required:
        - type
        - tiers
      properties:
        type:
          type: string
          enum:
            - volume
          description: The type of the price.
          title: Type
        tiers:
          type: array
          items:
            $ref: '#/components/schemas/BillingPriceTier'
          minItems: 1
          description: |-
            The tiers of the volume price.
            At least one tier is required.
          title: Tiers
      description: |-
        Volume tiered price.

        The maximum quantity within a period determines the per-unit price for
        all units in that period.

        When UnitConfig is present on the rate card, tier boundaries (up_to_amount)
        are expressed in converted billing units.
    BillingProfile:
      type: object
      required:
        - id
        - name
        - supplier
        - workflow
        - apps
        - default
      properties:
        id:
          allOf:
            - $ref: '#/components/schemas/ULID'
          readOnly: true
        name:
          type: string
          minLength: 1
          maxLength: 256
          description: |-
            Display name of the resource.

            Between 1 and 256 characters.
        description:
          type: string
          maxLength: 1024
          description: |-
            Optional description of the resource.

            Maximum 1024 characters.
        labels:
          $ref: '#/components/schemas/Labels'
        created_at:
          allOf:
            - $ref: '#/components/schemas/DateTime'
          description: An ISO-8601 timestamp representation of entity creation date.
          readOnly: true
        updated_at:
          allOf:
            - $ref: '#/components/schemas/DateTime'
          description: An ISO-8601 timestamp representation of entity last update date.
          readOnly: true
        deleted_at:
          allOf:
            - $ref: '#/components/schemas/DateTime'
          description: An ISO-8601 timestamp representation of entity deletion date.
          readOnly: true
        supplier:
          allOf:

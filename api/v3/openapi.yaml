            type: string
            description: Request the next page of data, starting with the item after this parameter.
          before:
            type: string
            description: Request the previous page of data, starting with the item before this parameter.
      style: deepObject
    PagePaginationQuery:
      name: page
      in: query
      required: false
      description: Determines which page of the collection to retrieve.
      schema:
        type: object
        properties:
          size:
            type: integer
            description: The number of items to include per page.
          number:
            type: integer
            description: The page number.
      style: deepObject
  schemas:
    Addon:
      type: object
      required:
        - id
        - name
        - key
        - version
        - instance_type
        - currency
        - status
        - rate_cards
      properties:
        id:
          allOf:
            - $ref: '#/components/schemas/ULID'
          readOnly: true
        name:
          type: string
          minLength: 1
          maxLength: 256
          description: |-
            Display name of the resource.

            Between 1 and 256 characters.
        description:
          type: string
          maxLength: 1024
          description: |-
            Optional description of the resource.

            Maximum 1024 characters.
        labels:
          $ref: '#/components/schemas/Labels'
        created_at:
          allOf:
            - $ref: '#/components/schemas/DateTime'
          description: An ISO-8601 timestamp representation of entity creation date.
          readOnly: true
        updated_at:
          allOf:
            - $ref: '#/components/schemas/DateTime'
          description: An ISO-8601 timestamp representation of entity last update date.
          readOnly: true
        deleted_at:
          allOf:
            - $ref: '#/components/schemas/DateTime'
          description: An ISO-8601 timestamp representation of entity deletion date.
          readOnly: true
        key:
          allOf:
            - $ref: '#/components/schemas/ResourceKey'
          description: |-
            A key is a semi-unique string that is used to identify the add-on.
            It is used to reference the latest `active` version of the add-on and is unique with the version number.
          title: Key
        version:
          type: integer
          minimum: 1
          description: Version of the add-on. Incremented when the add-on is updated.
          title: Version
          default: 1
          readOnly: true
        instance_type:
          allOf:
            - $ref: '#/components/schemas/AddonInstanceType'
          description: The InstanceType of the add-ons. Can be "single" or "multiple".
          title: The InstanceType of the add-ons. Can be "single" or "multiple".
        currency:
          allOf:
            - $ref: '#/components/schemas/BillingCurrencyCode'
          description: The currency code of the add-on.
          title: Currency
        effective_from:
          allOf:
            - $ref: '#/components/schemas/DateTime'
          description: The date and time when the add-on becomes effective. When not specified, the add-on is a draft.
          title: Effective start date
          readOnly: true
        effective_to:
          allOf:
            - $ref: '#/components/schemas/DateTime'
          description: The date and time when the add-on is no longer effective. When not specified, the add-on is effective indefinitely.
          title: Effective end date
          readOnly: true
        status:
          allOf:
            - $ref: '#/components/schemas/AddonStatus'
          description: |-
            The status of the add-on.
            Computed based on the effective start and end dates:
            - draft = no effectiveFrom
            - active = effectiveFrom <= now < effectiveTo
            - archived  = effectiveTo <= now
          title: Status
          readOnly: true
        rate_cards:
          type: array
          items:
            $ref: '#/components/schemas/BillingRateCard'
          description: The rate cards of the add-on.
          title: Rate cards
        validation_errors:
          type: array
          items:
            $ref: '#/components/schemas/ProductCatalogValidationError'
          description: List of validation errors.
          title: Validation errors
          readOnly: true
      description: Add-on allows extending subscriptions with compatible plans with additional ratecards.
    AddonInstanceType:
      type: string
      enum:
        - single
        - multiple
      description: |-
        The instanceType of the add-on.
        - `single`: Can be added to a subscription only once.
        - `multiple`: Can be added to a subscription more than once.
    AddonPagePaginatedResponse:
      type: object
      required:
        - data
        - meta
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Addon'

        payment_term:
          allOf:
            - $ref: '#/components/schemas/BillingPricePaymentTerm'
          description: |-
            The payment term of the rate card.
            In advance payment term can only be used for flat prices.
          title: Payment term
          default: in_arrears
        commitments:
          allOf:
            - $ref: '#/components/schemas/BillingSpendCommitments'
          description: |-
            Spend commitments for this rate card.
            Only applicable to usage-based prices (unit, graduated, volume).
          title: Commitments
        discounts:
          allOf:
            - $ref: '#/components/schemas/BillingRateCardDiscounts'

          allOf:
            - $ref: '#/components/schemas/BillingCurrencyCode'
          description: The currency of the granted credits.
        amount:
          allOf:
            - $ref: '#/components/schemas/Numeric'
          description: Granted credit amount.
        purchase:
          type: object
          properties:
            currency:
              allOf:
                - $ref: '#/components/schemas/CurrencyCode'
              description: Currency of the purchase amount.
            per_unit_cost_basis:
              allOf:
                - $ref: '#/components/schemas/Numeric'
              description: |-
                Cost basis per credit unit used to calculate the purchase amount.

                If `per_unit_cost_basis` is 0.50 and credit amount is $100.00,
                the total charge is $50.00.
                The value must be greater than 0. If the cost basis is 0, use
                `funding_method=none` instead.

                Defaults to 1.0.
              default: '1.0'
            availability_policy:
              allOf:
                - $ref: '#/components/schemas/BillingCreditAvailabilityPolicy'
              description: |-
                Controls when credits become available for consumption.

                Defaults to `on_creation`.
              default: on_creation

emit:
  - '@typespec/openapi3'
  - '@openmeter/typespec-typescript'
  - '@openmeter/typespec-go'
parameters:
  base-dir:
    default: '{cwd}'
output-dir: '{base-dir}'
options:
  '@typespec/openapi3':
    emitter-output-dir: '{output-dir}/output/definitions/metering-and-billing/v3'
    omit-unreachable-types: true
    seal-object-schemas: true
  '@openmeter/typespec-typescript':
    emitter-output-dir: '{output-dir}/../aip-client-javascript'
    # The npm package name the generated README installs and imports.
    package-name: '@openmeter/client'
    # Markdown callout inserted after the README intro.
    readme-note: |
      > [!IMPORTANT]
      > This SDK is a work in progress.
      >
      > This SDK targets the [OpenMeter API v3](https://openmeter.io/docs/api/v3),
      > a rewrite of the OpenMeter API following AIP (API Improvement Proposal)
      > standardization.
    # Emit per-operation schemas only for the OpenMeter service.
    include-services:
      - 'OpenMeter'
    # Mirror the TS SDK prefix stripping so the Zod schemas match.
    strip-name-prefixes:
      - 'Billing'
      - 'OpenMeter'
      - 'Metering'
  '@openmeter/typespec-go':
    emitter-output-dir: '{output-dir}/../../../v3/client'
    # Go module path (the published import identity, independent of where the client is generated in the repo).
    module-path: 'github.com/openmeterio/openmeter/api/v3/client'
    # Go package name; deliberately differs from the module path's last segment
    # (same precedent as api/client/go), goimports resolves it.
    package-name: 'openmeter'
    # Markdown callout inserted after the README intro.
    readme-note: |
      > [!IMPORTANT]
      > This SDK is a work in progress.
      >
      > This SDK targets the [OpenMeter API v3](https://openmeter.io/docs/api/v3),
      > a rewrite of the OpenMeter API following AIP (API Improvement Proposal)
      > standardization.
    include-services:
      - 'OpenMeter'
    strip-name-prefixes:
      - 'Billing'
      - 'OpenMeter'
      - 'Metering'
    go-version: '1.24'
linter:
  extends:
    - '@openmeter/api-spec-aip/all'
